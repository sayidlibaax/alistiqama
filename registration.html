<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
    <h1>Registration</h1>
</header>

<nav class="site-nav">
    <div class="nav-inner">
        <a href="index.html" class="brand">
            <span class="brand-logo">Alistiqama</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="team.html">Team</a>
            <a href="registration.html" class="active">Registration</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="form-container">
        <form>
            <label for="fullname">Full Name</label>
            <input id="fullname" type="text" name="fullname" required>

            <label for="email">Email</label>
            <input id="email" type="email" name="email" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" required>

            <div class="form-row">
                <div class="col">
                    <label for="dob">Date of Birth</label>
                    <input id="dob" type="date" name="dob">
                </div>
                <div class="col">
                    <label>Gender</label>
                    <div>
                        <label class="small-control"><input type="radio" name="gender" value="male"> Male</label>
                        <label class="small-control"><input type="radio" name="gender" value="female"> Female</label>
                    </div>
                </div>
            </div>

            <label for="country">Country</label>
            <select id="country" name="country">
                <option>Somalia</option>
                <option>Kenya</option>
                <option>Ethiopia</option>
                <option>Uganda</option>
            </select>

            <label>Skills</label>
            <label class="small-control"><input type="checkbox" name="skills" value="html"> HTML</label>
            <label class="small-control"><input type="checkbox" name="skills" value="css"> CSS</label>
            <label class="small-control"><input type="checkbox" name="skills" value="js"> JavaScript</label>

            <label for="address">Address</label>
            <textarea id="address" name="address" rows="4"></textarea>

            <div class="form-actions">
                <input type="submit" value="Register">
                <input type="reset" value="Clear">
            </div>
        </form>
    </div>
</div>

<footer>
    <div class="footer-inner">
        <p>© 2026 Al Istiqama Travel Agency</p>
        <p>Support: support@alistiqama.com</p>
    </div>
    </footer>

</body>
</html>
